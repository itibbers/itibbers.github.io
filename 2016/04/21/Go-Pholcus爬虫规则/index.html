loader/request"</span> <span class="comment">//必需</span></span><br><span class="line">    . <span class="string">"github.com/henrylee2cn/pholcus/app/spider"</span>           <span class="comment">//必需</span></span><br><span class="line">    <span class="comment">// "github.com/henrylee2cn/pholcus/logs"         //信息输出</span></span><br><span class="line">    <span class="comment">// . "github.com/henrylee2cn/pholcus/app/spider/common" //选用</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// net包</span></span><br><span class="line">    <span class="comment">// "net/http" //设置http.Header</span></span><br><span class="line">    <span class="comment">// "net/url"</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 编码包</span></span><br><span class="line">    <span class="comment">// "encoding/xml"</span></span><br><span class="line">    <span class="comment">// "encoding/json"</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 字符串处理包</span></span><br><span class="line">    <span class="string">"regexp"</span></span><br><span class="line">    <span class="string">"strconv"</span></span><br><span class="line">    <span class="comment">// "strings"</span></span><br><span class="line"></span><br><span class="line">    <span class="comment">// 其他包</span></span><br><span class="line">    <span class="comment">// "fmt"</span></span><br><span class="line">    <span class="comment">// "math"</span></span><br><span class="line">    <span class="comment">// "time"</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">func</span> <span class="title">init</span><span class="params">()</span></span> &#123;</span><br><span class="line">    IJGUC.Register()</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="keyword">var</span> IJGUC = &amp;Spider&#123;</span><br><span class="line">    Name:        <span class="string">"IJGUC期刊"</span>,</span><br><span class="line">    Description: <span class="string">"IJGUC期刊"</span>,</span><br><span class="line">    <span class="comment">// Pausetime:    300,</span></span><br><span class="line">    <span class="comment">// Keyin:        KEYIN,</span></span><br><span class="line">    <span class="comment">// Limit:        LIMIT,</span></span><br><span class="line">    EnableCookie: <span class="literal">false</span>,</span><br><span class="line">    RuleTree: &amp;RuleTree&#123;</span><br><span class="line">        Root: <span class="function"><span class="keyword">func</span><span class="params">(ctx *Context)</span></span> &#123;</span><br><span class="line">            ctx.AddQueue(&amp;request.Request&#123;</span><br><span class="line">                Url:  <span class="string">"http://www.inderscience.com/info/inarticletoc.php?jcode=ijguc&amp;year=2016&amp;vol=7&amp;issue=1"</span>,</span><br><span class="line">                Rule: <span class="string">"期刊列表"</span>,</span><br><span class="line">            &#125;)</span><br><span class="line">        &#125;,</span><br><span class="line"></span><br><span class="line">        Trunk: <span class="keyword">map</span>[<span class="keyword">string</span>]*Rule&#123;</span><br><span class="line">            <span class="string">"期刊列表"</span>: &#123;</span><br><span class="line">                ParseFunc: <span class="function"><span class="keyword">func</span><span class="params">(ctx *Context)</span></span> &#123;</span><br><span class="line">                    query := ctx.GetDom()</span><br><span class="line">                    <span class="keyword">for</span> i := <span class="number">1</span>; i &lt;= <span class="number">7</span>; i++ &#123;</span><br><span class="line">                        id := <span class="string">"#eventbody"</span> + strconv.Itoa(i) + <span class="string">" a"</span></span><br><span class="line">                        query.Find(id).Each(<span class="function"><span class="keyword">func</span><span class="params">(j <span class="keyword">int</span>, s *goquery.Selection)</span></span> &#123;</span><br><span class="line">                            <span class="keyword">if</span> url, ok := s.Attr(<span class="string">"href"</span>); ok &#123;</span><br><span class="line">                                <span class="comment">// log.Print(url)</span></span><br><span class="line">                                ctx.AddQueue(&amp;request.Request&#123;Url: url, Rule: <span class="string">"文章列表"</span>&#125;)</span><br><span class="line">                            &#125;</span><br><span class="line">                        &#125;)</span><br><span class="line">                    &#125;</span><br><span class="line">                &#125;,</span><br><span class="line">            &#125;,</span><br><span class="line">            <span class="string">"文章列表"</span>: &#123;</span><br><span class="line">                ParseFunc: <span class="function"><span class="keyword">func</span><span class="params">(ctx *Context)</span></span> &#123;</span><br><span class="line">                    query := ctx.GetDom()</span><br><span class="line">                    <span class="comment">//#journalcol1 article table tbody tr td:eq(1) table:eq(1) a</span></span><br><span class="line">                    query.Find(<span class="string">"#journalcol1 article table tbody tr td"</span>).Each(<span class="function"><span class="keyword">func</span><span class="params">(i <span class="keyword">int</span>, td *goquery.Selection)</span></span> &#123;</span><br><span class="line">                        <span class="keyword">if</span> i == <span class="number">1</span> &#123;</span><br><span class="line">                            td.Find(<span class="string">"table"</span>).Each(<span class="function"><span class="keyword">func</span><span class="params">(j <span class="keyword">int</span>, table *goquery.Selection)</span></span> &#123;</span><br><span class="line">                                <span class="keyword">if</span> j == <span class="number">1</span> &#123;</span><br><span class="line">                                    table.Find(<span class="string">"a"</span>).Each(<span class="function"><span class="keyword">func</span><span class="params">(k <span class="keyword">int</span>, a *goquery.Selection)</span></span> &#123;</span><br><span class="line">                                        <span class="keyword">if</span> k%<span class="number">2</span> == <span class="number">0</span> &#123;</span><br><span class="line">                                            <span class="keyword">if</span> url, ok := a.Attr(<span class="string">"href"</span>); ok &#123;</span><br><span class="line">                                                <span class="comment">// log.Print(url)</span></span><br><span class="line">                                                ctx.AddQueue(&amp;request.Request&#123;Url: url, Rule: <span class="string">"文章页"</span>&#125;)</span><br><span class="line">                                            &#125;</span><br><span class="line">                                        &#125;</span><br><span class="line">                                    &#125;)</span><br><span class="line">                                &#125;</span><br><span class="line">                            &#125;)</span><br><span class="line">                        &#125;</span><br><span class="line">                    &#125;)</span><br><span class="line">                &#125;,</span><br><span class="line">            &#125;,</span><br><span class="line">            <span class="string">"文章页"</span>: &#123;</span><br><span class="line">                <span class="comment">//注意：有无字段语义和是否输出数据必须保持一致</span></span><br><span class="line">                ItemFields: []<span class="keyword">string</span>&#123;</span><br><span class="line">                    <span class="string">"Title"</span>,</span><br><span class="line">                    <span class="string">"Author"</span>,</span><br><span class="line">                    <span class="string">"Addresses"</span>,</span><br><span class="line">                    <span class="string">"Journal"</span>,</span><br><span class="line">                    <span class="string">"Abstract"</span>,</span><br><span class="line">                    <span class="string">"Keywords"</span>,</span><br><span class="line">                    <span class="string">"DOI"</span>,</span><br><span class="line">                &#125;,</span><br><span class="line">                ParseFunc: <span class="function"><span class="keyword">func</span><span class="params">(ctx *Context)</span></span> &#123;</span><br><span class="line">                    query := ctx.GetDom()</span><br><span class="line">                    <span class="comment">// 获取内容</span></span><br><span class="line">                    content := query.Find(<span class="string">"#col1"</span>).Text()</span><br><span class="line"></span><br><span class="line">                    <span class="comment">// 过滤标签</span></span><br><span class="line">                    re, _ := regexp.Compile(<span class="string">"\\&lt;[\\S\\s]+?\\&gt;"</span>)</span><br><span class="line">                    content = re.ReplaceAllString(content, <span class="string">""</span>)</span><br><span class="line"></span><br><span class="line">                    <span class="comment">// Title</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Title:(.*?)Author:"</span>)</span><br><span class="line">                    title := re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    <span class="comment">// Author</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Author:(.*?)Addresses:"</span>)</span><br><span class="line">                    au := re.FindStringSubmatch(content)</span><br><span class="line">                    <span class="keyword">var</span> author <span class="keyword">string</span></span><br><span class="line">                    <span class="keyword">if</span> <span class="built_in">len</span>(au) &gt; <span class="number">0</span> &#123;</span><br><span class="line">                        author = au[<span class="number">1</span>]</span><br><span class="line">                    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                        re, _ = regexp.Compile(<span class="string">"Author:(.*?)Address:"</span>)</span><br><span class="line">                        author = re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    &#125;</span><br><span class="line">                    <span class="comment">// Addresses &amp; Address</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Addresses:(.*?)Journal:"</span>)</span><br><span class="line">                    address := re.FindStringSubmatch(content)</span><br><span class="line">                    <span class="keyword">var</span> addresses <span class="keyword">string</span></span><br><span class="line">                    <span class="keyword">if</span> <span class="built_in">len</span>(address) &gt; <span class="number">0</span> &#123;</span><br><span class="line">                        addresses = address[<span class="number">1</span>]</span><br><span class="line">                    &#125; <span class="keyword">else</span> &#123;</span><br><span class="line">                        re, _ = regexp.Compile(<span class="string">"Address:(.*?)Journal:"</span>)</span><br><span class="line">                        addresses = re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    &#125;</span><br><span class="line">                    <span class="comment">// Journal</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Journal:(.*?)Abstract:"</span>)</span><br><span class="line">                    journal := re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    <span class="comment">// Abstract</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Abstract:(.*?)Keywords:"</span>)</span><br><span class="line">                    abstract := re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    <span class="comment">// Keywords</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"Keywords:(.*?)DOI:"</span>)</span><br><span class="line">                    keywords := re.FindStringSubmatch(content)[<span class="number">1</span>]</span><br><span class="line">                    <span class="comment">// DOI</span></span><br><span class="line">                    re, _ = regexp.Compile(<span class="string">"DOI: "</span>)</span><br><span class="line">                    doiIndex := re.FindStringSubmatchIndex(content)</span><br><span class="line">                    rs := []<span class="keyword">rune</span>(content)</span><br><span class="line">                    left := doiIndex[<span class="number">1</span>] - <span class="number">8</span></span><br><span class="line">                    right := left + <span class="number">43</span></span><br><span class="line">                    doi := <span class="keyword">string</span>(rs[left:right])</span><br><span class="line"></span><br><span class="line">                    <span class="comment">// 结果存入Response中转</span></span><br><span class="line">                    ctx.Output(<span class="keyword">map</span>[<span class="keyword">int</span>]<span class="keyword">interface</span>&#123;&#125;&#123;</span><br><span class="line">                        <span class="number">0</span>: title,</span><br><span class="line">                        <span class="number">1</span>: author,</span><br><span class="line">                        <span class="number">2</span>: addresses,</span><br><span class="line">                        <span class="number">3</span>: journal,</span><br><span class="line">                        <span class="number">4</span>: abstract,</span><br><span class="line">                        <span class="number">5</span>: keywords,</span><br><span class="line">                        <span class="number">6</span>: doi,</span><br><span class="line">                    &#125;)</span><br><span class="line">                &#125;,</span><br><span class="line">            &#125;,</span><br><span class="line">        &#125;,</span><br><span class="line">    &#125;,</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
