<p>就会出现问题，比如当传递的时候：<code>href=&quot;#/tab/&quot;，假如u的值为</code><a href="http://isunday.top`，那么拼接起来就会变成：" target="_blank" rel="noopener">http://isunday.top`，那么拼接起来就会变成：</a><br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">#/tab/http://isunday.top</span><br></pre></td></tr></table></figure></p>
<p>造成错误, so，定义path类型的路由应该如下：<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">url: &quot;/newslist/&#123;path:.*&#125;&quot;</span><br></pre></td></tr></table></figure></p>
<p>或者：<br><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">url: &quot;/newslist/*path&quot;</span><br></pre></td></tr></table></figure></p>
